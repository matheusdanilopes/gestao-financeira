<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White rounded background (iOS-style) -->
  <rect width="512" height="512" rx="110" fill="#ffffff"/>

  <!-- Wallet body -->
  <rect x="72" y="176" width="368" height="240" rx="44" fill="#166534"/>

  <!-- Top flap (lighter green) -->
  <rect x="72" y="176" width="368" height="88" rx="44" fill="#15803d"/>
  <!-- Fill the gap between top rounded corners and body -->
  <rect x="72" y="220" width="368" height="44" fill="#15803d"/>

  <!-- Card pocket on right -->
  <rect x="308" y="240" width="116" height="104" rx="22" fill="#14532d"/>

  <!-- Clasp coin/button -->
  <circle cx="366" cy="292" r="24" fill="#4ade80"/>
  <circle cx="366" cy="292" r="12" fill="#166534"/>

  <!-- Money lines on left (suggestion of bills) -->
  <rect x="96" y="332" width="172" height="16" rx="8" fill="#4ade80" opacity="0.70"/>
  <rect x="96" y="360" width="132" height="16" rx="8" fill="#4ade80" opacity="0.45"/>
</svg>
